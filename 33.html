<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>MindAR 多章節互動作業</title>
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            touch-action: none; /* 鎖定視圖，避免瀏覽器原生縮放干擾 */
        }
        a-scene {
            width: 100%; height: 100%;
            position: fixed; top: 0; left: 0;
        }
        .mindar-ui-loading, .mindar-ui-error, .mindar-ui-scanning {
            display: none;
        }
        #custom-text {
            display: none;
            position: fixed;
            bottom: calc(30px + env(safe-area-inset-bottom)); 
            width: max-content;
            max-width: 80%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(106, 167, 203, 0.85);
            color: white;
            padding: 0.5em 1em;
            font-size: 1.5em;
            border-radius: 0.3em;
            z-index: 9999;
            pointer-events: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="custom-text">章節文字準備中...</div>

    <a-scene
        mindar-image="imageTargetSrc: targets.mind; autoStart: true; uiLoading: false; uiError: false; uiScanning: false;"
        color-space="sRGB"
        renderer="colorManagement: true; physicallyCorrectLights: true"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        cursor="rayOrigin: mouse"
        raycaster="objects: .clickable"
    >
        <a-assets>
            <img id="img-ch1" src="card1.jpg" />
            <img id="img-ch2" src="card2.jpg" />
            <img id="img-ch3" src="card3.jpg" />
            <img id="img-ch4" src="card4.jpg" />
            <img id="img-ch5" src="card5.jpg" />
            <img id="img-ch6" src="card6.jpg" />
            <img id="img-ch7" src="card7.jpg" />
            <img id="img-ch8" src="card8.jpg" />
            <img id="img-ch9" src="card9.jpg" />
        </a-assets>

        <a-light type="ambient" intensity="3"></a-light>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" class="ar-target" data-chapter="0">
            <a-plane src="#img-ch1" class="clickable" width="1.2" height="0.7" position="0 0 0" touch-transform></a-plane>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 1" class="ar-target" data-chapter="1">
            <a-plane src="#img-ch2" class="clickable" width="1.2" height="0.7" position="0 0 0" touch-transform></a-plane>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 2" class="ar-target" data-chapter="2">
            <a-plane src="#img-ch3" class="clickable" width="1.2" height="0.7" position="0 0 0" touch-transform></a-plane>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 3" class="ar-target" data-chapter="3">
            <a-plane src="#img-ch4" class="clickable" width="1.2" height="0.7" position="0 0 0" touch-transform></a-plane>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 4" class="ar-target" data-chapter="4">
            <a-plane src="#img-ch5" class="clickable" width="1.2" height="0.7" position="0 0 0" touch-transform></a-plane>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 5" class="ar-target" data-chapter="5">
            <a-plane src="#img-ch6" class="clickable" width="1.2" height="0.7" position="0 0 0" touch-transform></a-plane>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 6" class="ar-target" data-chapter="6">
            <a-plane src="#img-ch7" class="clickable" width="1.2" height="0.7" position="0 0 0" touch-transform></a-plane>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 7" class="ar-target" data-chapter="7">
            <a-plane src="#img-ch8" class="clickable" width="1.2" height="0.7" position="0 0 0" touch-transform></a-plane>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 8" class="ar-target" data-chapter="8">
            <a-plane src="#img-ch9" class="clickable" width="1.2" height="0.7" position="0 0 0" touch-transform></a-plane>
        </a-entity>

    </a-scene>

    <script>
        // 修正點 3: 清除陣列中混雜的 HTML 代碼，確保資料結構純淨
        const chapterTexts = [
            "這是我們的頭",
            "肩膀咪咪",
            "手哦",
            "脊椎骨，沒有就站不起來",
            "忘記了",
            "手掌",
            "髖骨",
            "腿腿腿",
            "腳掌！"
        ];

        // 手勢控制組件
        AFRAME.registerComponent('touch-transform', {
            init: function () {
                this.defaultScale = this.el.object3D.scale.x;
                this.currentScale = this.defaultScale;
                this.prevDistance = null;
                this.prevAngle = null;
                this.isDragging = false;
                this.previousMousePosition = { x: 0, y: 0 };
                this.lastTap = 0;

                this.el.addEventListener('click', () => {
                    const now = Date.now();
                    if (now - this.lastTap < 300) {
                        this.el.object3D.scale.set(this.defaultScale, this.defaultScale, this.defaultScale);
                        this.el.object3D.rotation.set(0, 0, 0);
                        this.currentScale = this.defaultScale;
                    }
                    this.lastTap = now;
                });

                this.el.sceneEl.addEventListener('loaded', () => {
                    const canvas = this.el.sceneEl.canvas;

                    canvas.addEventListener('touchstart', (e) => {
                        if (!this.el.parentEl.object3D.visible) return;
                        if (e.touches.length === 2) {
                            const dx = e.touches[0].clientX - e.touches[1].clientX;
                            const dy = e.touches[0].clientY - e.touches[1].clientY;
                            this.prevDistance = Math.hypot(dx, dy);
                            this.prevAngle = Math.atan2(dy, dx);
                        }
                    });

                    canvas.addEventListener('touchmove', (e) => {
                        if (!this.el.parentEl.object3D.visible) return;
                        if (e.touches.length === 2 && this.prevDistance !== null) {
                            const dx = e.touches[0].clientX - e.touches[1].clientX;
                            const dy = e.touches[0].clientY - e.touches[1].clientY;
                            const dist = Math.hypot(dx, dy);
                            const angle = Math.atan2(dy, dx);

                            const scaleFactor = dist / this.prevDistance;
                            this.currentScale *= scaleFactor;
                            this.currentScale = Math.min(Math.max(this.currentScale, 0.5), 3);
                            this.el.object3D.scale.set(this.currentScale, this.currentScale, this.currentScale);

                            const deltaAngle = angle - this.prevAngle;
                            const rot = this.el.object3D.rotation;
                            this.el.object3D.rotation.set(rot.x, rot.y, rot.z + deltaAngle);

                            this.prevDistance = dist;
                            this.prevAngle = angle;
                            e.preventDefault();
                        }
                    });

                    canvas.addEventListener('touchend', (e) => {
                        if (e.touches.length < 2) {
                            this.prevDistance = null;
                            this.prevAngle = null;
                        }
                    });

                    canvas.addEventListener('wheel', (e) => {
                        if (!this.el.parentEl.object3D.visible) return;
                        e.preventDefault();
                        const scaleFactor = e.deltaY < 0 ? 1.05 : 0.95; 
                        this.currentScale *= scaleFactor;
                        this.currentScale = Math.min(Math.max(this.currentScale, 0.5), 3);
                        this.el.object3D.scale.set(this.currentScale, this.currentScale, this.currentScale);
                    });

                    canvas.addEventListener('mousedown', (e) => {
                        if (!this.el.parentEl.object3D.visible) return;
                        this.isDragging = true;
                        this.previousMousePosition = { x: e.offsetX, y: e.offsetY };
                    });

                    canvas.addEventListener('mousemove', (e) => {
                        if (!this.isDragging || !this.el.parentEl.object3D.visible) return;
                        const deltaMove = {
                            x: e.offsetX - this.previousMousePosition.x,
                            y: e.offsetY - this.previousMousePosition.y
                        };
                        const rot = this.el.object3D.rotation;
                        this.el.object3D.rotation.set(
                            rot.x + deltaMove.y * 0.01, 
                            rot.y + deltaMove.x * 0.01, 
                            rot.z
                        );
                        this.previousMousePosition = { x: e.offsetX, y: e.offsetY };
                    });

                    window.addEventListener('mouseup', () => {
                        this.isDragging = false;
                    });
                });
            }
        });

        // 綁定 UI 文字顯示與隱藏
        window.addEventListener("load", () => {
            const targets = document.querySelectorAll(".ar-target");
            const customDiv = document.querySelector("#custom-text");

            targets.forEach(target => {
                const chIndex = parseInt(target.getAttribute("data-chapter"), 10);

                target.addEventListener("targetFound", () => {
                    customDiv.innerText = chapterTexts[chIndex];
                    customDiv.style.display = "block";
                });

                target.addEventListener("targetLost", () => {
                    customDiv.style.display = "none";
                });
            });
        });
    </script>
</body>
</html>
